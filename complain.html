    <form onsubmit="showComplaint(event)">
        <fieldset>
            <legend>Complaint Box</legend>

            <label for="complainer-name">Buyer Name</label>
            <input type="text" id="complainer-name" placeholder="Buyer Name" required><br>

            <label for="oderid">Order ID</label>
            <input type="number" id="oderid" placeholder="Order ID"><br>

            <label for="complainer-email">Email ID</label>
            <input type="email" id="complainer-email" placeholder="Email ID"><br>

            <label for="proof">Media</label><br>
            <input type="file" id="proof" placeholder="Upload photo or video">

            <label for="message">Your Message:</label><br>
            <textarea id="message" name="message" rows="6" cols="40" placeholder="Type your complain here..."
                required></textarea><br><br>

            <button type="submit">Send complain</button>
        </fieldset>

        <div>
            <fieldset>
                <legend>Track your Complain</legend>
                <label for="tracking-complain">Track your Complain</label>
                <input type="text" id="tracking-complain" placeholder="Enter your Tracking ID"><br>
                <button type="button">Track</button>
            </fieldset>
        </div>
    </form>
