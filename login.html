<!DOCTYPE html>
<html lang="en"
    style="background-image: url(https://wallpaperaccess.com/full/4214216.jpg);background-repeat: no-repeat;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VASMUSTORE-login</title>
    <style>
        .icon-btn {
            width: 60px;
            height: 50px;
            background-image: url('https://cdn3.emoji.gg/emojis/27333-login.png');
            background-size: cover;
            background-repeat: no-repeat;
            border: wheat;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div>
        <h1
            style="font:bold;; font-style:italic ; background-image: url(https://media.gettyimages.com/id/1395602427/vector/blur-gradient-glow-abstract-background.jpg?s=612x612&w=0&k=20&c=Qa-3h2xMpMrX3yGz_R_l8A1u7yRPwQHs6XO6y-1nzZY=); font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;color: rgb(65, 65, 205); text-align: center;text-decoration: wavy;background-repeat: no-repeat;background-size: cover;">
            LOGIN PAGE</h1>

        <form action="index.html/#cart" method="get" style="text-align: center;text-decoration: wavy;">
            <fieldset>
                <legend
                    style="color: rgb(38, 22, 157);text-shadow: 1cm;font-size: medium;font-family: 'Times New Roman', Times, serif;font-style: oblique;font-style: bold; background-color: rgb(222, 190, 48);">
                    ᑕOᑎᑎEᑕTIᑎG ᗯITᕼ ડEᑕᑌᖇEᗪ ᑎETᗯᖇOK </legend>
                <button class="icon-btn" title="Click me"></button>
                <br>
                <br>
                <br>

                <label for="userid" style="font-family: Arial, Helvetica, sans-serif;">USER NAME:</label>
                <input type="text" id="userid" placeholder="Enter Username" required
                    style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background-color: beige;">
                <br>
                <BR>
                <label for="password" style="font-family: Arial, Helvetica, sans-serif;">PASSWORD:</label>
                <input type="text" id="password" placeholder="Enter Password" required
                    style="font-style: oblique;font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;background-color: antiquewhite;">
                <br>
                <br>
                <label id="prove you are not robot" style="font-family: Arial, Helvetica, sans-serif">𝑰 𝒂𝒎 𝒏𝒐𝒕
                    𝒓𝒐𝒃𝒐𝒕🤖</label>
                <input type="checkbox" id="prove you are not robot">
                <br>
                <input type="checkbox" id="t&c" required>
                <label id="t&C" style="font-family: Arial, Helvetica, sans-serif"><a
                        href="Terms&Conditions.html">Terms&conditions</a></label>

                <br>
                <input type="checkbox" id="policy" required>
                <label id="policy" style="font-family: Arial, Helvetica, sans-serif"><a
                        href="policy.html">Policy</a></label>

                <br>
                <br>
                <a href="create-account.html">New User</a>
                <br>
                <br>

                <button type="submit" value="submit" ,
                    style="color: rgb(48, 59, 206);font-size: 15px;padding: 3px 20px;border-radius: 12px"
                    style="font-style: italic;">submit</button>

            </fieldset>
        </form>
    </div>
</body>

</html>
